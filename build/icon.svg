<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- 高光效果 -->
  <rect width="256" height="128" rx="48" fill="url(#shine)"/>
  <!-- C字母 -->
  <text x="128" y="180" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="white" text-anchor="middle">C</text>
  <!-- 清理图标 - 小刷子 -->
  <g transform="translate(160, 160) rotate(-45)">
    <rect x="-4" y="-30" width="8" height="40" rx="2" fill="white" opacity="0.9"/>
    <rect x="-10" y="-40" width="20" height="15" rx="4" fill="white" opacity="0.9"/>
  </g>
</svg>
